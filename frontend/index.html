<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="ServerKit - Server Management Dashboard" />
    <title>ServerKit</title>
    <script>
        // Prevent flash of unstyled content (FOUC) by setting theme + accent before React loads
        (function() {
            var d = document.documentElement;
            d.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
            var accent = localStorage.getItem('accent_color');
            if (accent) {
                var m = accent.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
                if (m) {
                    var r = parseInt(m[1],16), g = parseInt(m[2],16), b = parseInt(m[3],16);
                    var dk = function(v){ return Math.max(0, Math.round(v*0.88)); };
                    d.style.setProperty('--accent-primary', accent);
                    d.style.setProperty('--accent-hover', '#'+dk(r).toString(16).padStart(2,'0')+dk(g).toString(16).padStart(2,'0')+dk(b).toString(16).padStart(2,'0'));
                    d.style.setProperty('--accent-glow', 'rgba('+r+','+g+','+b+',0.15)');
                    d.style.setProperty('--accent-shadow', 'rgba('+r+','+g+','+b+',0.3)');
                }
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
